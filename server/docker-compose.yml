services:
  reservationapp.api:
    image: ${DOCKER_REGISTRY-}reservationappapi
    build:
      context: .
      dockerfile: ReservationApp.Api/Dockerfile
  sqlserverdb:
    image: mcr.microsoft.com/mssql/server
